<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/hritigamehub/">
    <title>404 — Hriti's Game Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌟</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .lost-emoji { font-size: 6rem; animation: float 3s ease-in-out infinite; margin-bottom: 16px; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }
        h1 { font-size: 3rem; margin-bottom: 8px; text-shadow: 0 3px 20px rgba(0,0,0,0.2); }
        p { font-size: 1.1rem; color: rgba(255,255,255,0.8); margin-bottom: 32px; }
        .btn {
            padding: 14px 40px;
            border: none; border-radius: 16px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            color: white;
            font-size: 1.1rem; font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-block;
        }
        .btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-3px); }
        .bubbles { position: fixed; bottom: 0; left: 0; width: 100%; pointer-events: none; }
        .bubble {
            position: absolute; bottom: -20px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            animation: rise 8s ease-in infinite;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="lost-emoji">🧭</div>
    <h1>404 — Lost?</h1>
    <p>This page wandered off like a penguin exploring a new sanctuary!</p>
    <a href="/" class="btn">🏠 Go Home</a>
    <div class="bubbles">
        <div class="bubble" style="left:10%;width:40px;height:40px;animation-delay:0s;"></div>
        <div class="bubble" style="left:30%;width:60px;height:60px;animation-delay:2s;"></div>
        <div class="bubble" style="left:55%;width:30px;height:30px;animation-delay:4s;"></div>
        <div class="bubble" style="left:75%;width:50px;height:50px;animation-delay:1s;"></div>
        <div class="bubble" style="left:90%;width:35px;height:35px;animation-delay:3s;"></div>
    </div>
</body>
</html>
