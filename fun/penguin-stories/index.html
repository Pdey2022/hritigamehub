<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐧 Penguin Stories — Read Fun Kid's Stories | Hriti's Game Hub</title>
    <meta name="description" content="Read delightful penguin stories for kids! Follow Pip the Penguin on icy adventures, fun discoveries, and heartwarming tales — free to read online!">
    <meta name="theme-color" content="#1a1a3e">
    <meta property="og:title" content="🐧 Penguin Stories — Read Fun Kid's Stories">
    <meta property="og:description" content="Follow Pip the Penguin on fun, heartwarming Arctic adventures! Free stories for kids.">
    <meta property="og:url" content="https://hritihub.uk/fun/penguin-stories/">
    <meta property="og:image" content="https://hritihub.uk/assets/images/hub-og.svg">
    <meta property="og:site_name" content="Hriti's Game Hub">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="🐧 Penguin Stories">
    <meta name="twitter:description" content="Free penguin stories for kids! Read online.">
    <meta name="twitter:image" content="https://hritihub.uk/assets/images/hub-og.svg">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐧</text></svg>">
    <link rel="canonical" href="https://hritihub.uk/fun/penguin-stories/">
    <link rel="stylesheet" href="/assets/css/style.css?v=13">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .ps-page { background: #1a1a3e; min-height: 100vh; font-family: 'Fredoka', sans-serif; }
        .ps-hero { position: relative; text-align: center; padding: 80px 20px 10px; max-width: 900px; margin: 0 auto; z-index: 1; }
        .ps-hero h1 { font-size: 2.8rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
        .ps-hero p { font-size: 1rem; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
        .ps-hero .ps-count { display: inline-block; font-size: 0.75rem; color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); padding: 3px 12px; border-radius: 100px; }
        .ps-hero .back-link {
            display: inline-block; margin-top: 10px;
            color: #ffd700; text-decoration: none; font-size: 0.9rem; font-weight: 600;
            padding: 8px 20px; border-radius: 100px;
            background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.25);
            animation: backLinkPulse 2s ease-in-out infinite;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .ps-hero .back-link:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        @keyframes backLinkPulse {
            0%, 100% { box-shadow: 0 0 6px rgba(255,215,0,0.1); }
            50% { box-shadow: 0 0 18px rgba(255,215,0,0.25); }
        }

        /* Search bar */
        .ps-search { max-width: 960px; margin: 12px auto 0; padding: 0 20px; }
        .ps-search input {
            width: 100%; padding: 10px 18px; border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 100px; background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px); color: #fff; font-size: 0.9rem;
            font-family: 'Fredoka', sans-serif; outline: none; box-sizing: border-box;
            transition: all 0.3s;
        }
        .ps-search input:focus { border-color: rgba(255,215,0,0.4); box-shadow: 0 0 20px rgba(255,215,0,0.08); }
        .ps-search input::placeholder { color: rgba(255,255,255,0.3); }

        /* Category filters — matches landing page */
        .ps-categories { max-width: 960px; margin: 12px auto 0; padding: 0 20px; }
        .ps-categories .categories-grid {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
        }
        .ps-categories .category-card {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 10px 14px 8px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; cursor: pointer; font-family: inherit; color: #fff;
            transition: all 0.25s ease; text-align: center; position: relative; overflow: hidden;
            background: rgba(255,255,255,0.04); min-width: 60px;
        }
        .ps-categories .category-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.25); }
        .ps-categories .category-card-active { border-color: rgba(255,215,0,0.5) !important; box-shadow: 0 4px 16px rgba(0,0,0,0.3) !important; background: rgba(255,215,0,0.08); }
        .ps-categories .category-icon { font-size: 1.4rem; transition: transform 0.3s ease; }
        .ps-categories .category-card:hover .category-icon { transform: scale(1.15) rotate(-5deg); }
        .ps-categories .category-name { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.7); }
        .ps-categories .category-count { font-size: 0.6rem; color: rgba(255,255,255,0.3); }

        /* Carousel */
        .ps-carousel { max-width: 960px; margin: 16px auto 40px; padding: 0 20px; position: relative; }
        .ps-list {
            display: flex; flex-flow: column wrap; height: 280px;
            overflow-x: auto; scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 8px 4px 16px; gap: 12px;
        }
        .ps-list::-webkit-scrollbar { display: none; }
        .ps-card {
            flex: 0 0 auto; width: 240px; scroll-snap-align: start;
            background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 18px;
            padding: 18px 18px 16px; backdrop-filter: blur(12px); cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            position: relative; overflow: hidden;
        }
        .ps-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, rgba(255,215,0,0.4), rgba(255,107,107,0.4), rgba(83,144,217,0.4));
            border-radius: 0 0 4px 4px; opacity: 0; transition: opacity 0.25s;
        }
        .ps-card:hover::before { opacity: 1; }
        .ps-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.35); border-color: rgba(255,215,0,0.2); }
        .ps-card:active { transform: scale(0.97); }
        .ps-card-top { display: flex; align-items: center; gap: 12px; }
        .ps-card-icon {
            font-size: 1.8rem; width: 40px; height: 40px; border-radius: 12px;
            background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .ps-card-info { flex: 1; min-width: 0; }
        .ps-card-title { font-size: 0.95rem; font-weight: 700; color: #fff; }
        .ps-card-meta { font-size: 0.7rem; color: rgba(255,255,255,0.35); margin-top: 2px; }
        .ps-card-tags { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
        .ps-card-tag { padding: 2px 8px; border-radius: 100px; background: rgba(255,255,255,0.06); font-size: 0.62rem; color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.06); }

        /* Arrows */
        .ps-arrow {
            position: absolute; top: 50%; transform: translateY(-50%); z-index: 2;
            width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); cursor: pointer;
            font-size: 1.2rem; color: #fff; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }
        .ps-arrow:hover { background: rgba(255,255,255,0.2); transform: translateY(-50%) scale(1.1); }
        .ps-arrow-prev { left: 0; }
        .ps-arrow-next { right: 0; }

        /* Story reader */
        .ps-reader { display: none; }
        .ps-reader.open { display: block; animation: psFadeIn 0.35s ease; }
        @keyframes psFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ps-reader-inner { max-width: 700px; margin: 0 auto 40px; padding: 0 20px; }
        .ps-story-header { text-align: center; margin-bottom: 20px; }
        .ps-story-icon { font-size: 3.5rem; margin-bottom: 8px; }
        .ps-story-title { font-size: 1.7rem; font-weight: 800; color: #ffd700; margin-bottom: 4px; }
        .ps-story-meta { font-size: 0.8rem; color: rgba(255,255,255,0.3); }
        .ps-story-body {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px;
            padding: 32px 36px; line-height: 2; font-size: 1.08rem; color: rgba(255,255,255,0.82);
        }
        .ps-story-body p { margin: 0 0 18px; transition: background 0.3s; border-radius: 8px; padding: 3px 8px; }
        .ps-story-body p:first-child::first-letter { font-size: 2.5rem; font-weight: 700; color: #ffd700; float: left; line-height: 1; margin-right: 6px; }
        .ps-story-body p:last-child { margin-bottom: 0; text-align: center; font-weight: 600; color: #ffd700; font-size: 1.1rem; }
        .ps-story-body p.speaking { background: rgba(255,215,0,0.12); }

        /* Read Aloud controls */
        .ps-audio-bar {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin: 16px 0 4px; flex-wrap: wrap;
        }
        .ps-audio-btn {
            padding: 8px 20px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); cursor: pointer;
            font-family: 'Fredoka', sans-serif; font-size: 0.85rem; font-weight: 600;
            transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .ps-audio-btn:hover { background: rgba(255,255,255,0.15); }
        .ps-audio-btn.active { background: rgba(76,175,80,0.2); border-color: rgba(76,175,80,0.4); color: #4caf50; }
        .ps-audio-btn.speaking-active { animation: psPulse 1.2s ease-in-out infinite; }
        @keyframes psPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(76,175,80,0.3); } 50% { box-shadow: 0 0 16px 4px rgba(76,175,80,0.15); } }
        .ps-speed-btn { font-size: 0.75rem; padding: 4px 12px; min-width: 48px; }
        .ps-audio-status {
            font-size: 0.8rem; color: rgba(255,255,255,0.3); text-align: center;
            transition: opacity 0.3s; min-height: 1.2em;
        }
        .ps-back-btn {
            display: inline-block; margin-top: 16px; padding: 10px 24px; border-radius: 12px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.6); font-size: 0.9rem; cursor: pointer; font-family: 'Fredoka', sans-serif;
            transition: background 0.2s;
        }
        .ps-back-btn:hover { background: rgba(255,255,255,0.14); }

        @media (max-width: 600px) {
            .ps-hero h1 { font-size: 2rem; }
            .ps-hero p { font-size: 0.9rem; }
            .ps-list { height: 255px; }
            .ps-card { width: 180px; padding: 14px; }
            .ps-card-icon { width: 34px; height: 34px; font-size: 1.4rem; }
            .ps-card-title { font-size: 0.85rem; }
            .ps-story-body { padding: 20px 18px; font-size: 0.95rem; line-height: 1.8; }
            .ps-story-body p:first-child::first-letter { font-size: 1.8rem; }
            .ps-story-icon { font-size: 2.5rem; }
            .ps-story-title { font-size: 1.3rem; }
            .ps-arrow { width: 28px; height: 28px; font-size: 1rem; }
            .ps-categories .category-card { padding: 8px 10px 6px; min-width: 50px; }
            .ps-categories .category-icon { font-size: 1.1rem; }
            .ps-categories .category-name { font-size: 0.6rem; }
        }
    </style>
</head>

    <!-- Story list view -->

    <div class="ps-reader" id="ps-reader">

    <script>
        (function() {
            const container = document.getElementById('bg-particles');
            if (!container) return;
            const count = 30;
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'bg-particle';
                const size = Math.random() * 4 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 15) + 's';
                p.style.opacity = Math.random() * 0.5 + 0.1;
                fragment.appendChild(p);
            }
            container.appendChild(fragment);
        })();
    </script>
    <script>
        (function() {
            const container = document.getElementById('bg-bubbles');
            if (!container) return;
            const count = 12;
            const sizes = [18, 24, 30, 36, 42, 50];
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < count; i++) {
                const b = document.createElement('div');
                b.className = 'bg-bubble';
                const size = sizes[Math.floor(Math.random() * sizes.length)];
                b.style.width = size + 'px';
                b.style.height = size + 'px';
                b.style.left = Math.random() * 100 + '%';
                b.style.animationDuration = (Math.random() * 18 + 14) + 's';
                b.style.animationDelay = (Math.random() * 20) + 's';
                b.style.opacity = Math.random() * 0.3 + 0.1;
                fragment.appendChild(b);
            }
            container.appendChild(fragment);
        })();
    </script>

    <script>document.body.classList.add('loaded')</script>
    <script>
        (function() {
            const listView = document.getElementById('ps-list-view');
            const readerView = document.getElementById('ps-reader');
            const listEl = document.getElementById('ps-list');
            const storyIcon = document.getElementById('ps-story-icon');
            const storyTitle = document.getElementById('ps-story-title');
            const storyMeta = document.getElementById('ps-story-meta');
            const storyBody = document.getElementById('ps-story-body');
            const backBtn = document.getElementById('ps-back-btn');

            let stories = [];
            var activeCategory = 'All';

            const CATEGORIES = {
                'All':  { icon: '\uD83D\uDCD6', color: 'rgba(255,255,255,0.04)' },
                'Penguin':  { icon: '\uD83D\uDC27', color: 'linear-gradient(135deg, #00bcd422, #0097a711)' },
                'Dinosaur':   { icon: '\uD83E\uDD95', color: 'linear-gradient(135deg, #4caf5022, #388e3c11)' },
                'Space':    { icon: '\uD83D\uDE80', color: 'linear-gradient(135deg, #9b59b622, #8e44ad11)' },
                'Ocean':    { icon: '\uD83C\uDF0A', color: 'linear-gradient(135deg, #3498db22, #2980b911)' },
                'Magic':    { icon: '\u2728', color: 'linear-gradient(135deg, #e91e6322, #c2185b11)' },
                'Farm':     { icon: '\uD83C\uDF3E', color: 'linear-gradient(135deg, #ff980022, #f57c0011)' },
                'Animals':  { icon: '\uD83D\uDC3E', color: 'linear-gradient(135deg, #e67e2222, #d3540011)' },
                'Insects':  { icon: '\uD83D\uDC1B', color: 'linear-gradient(135deg, #1abc9c22, #16a08511)' },
                'Birds':    { icon: '\uD83D\uDC26', color: 'linear-gradient(135deg, #e74c3c22, #c0392b11)' }
            };

            function getCategory(story) {
                for (var key in CATEGORIES) {
                    if (key === 'All') continue;
                    if (story.tags.indexOf(key) !== -1) return key;
                }
                return 'Animals';
            }

            fetch('/fun/penguin-stories/stories.json')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    stories = data;
                    document.getElementById('ps-total').textContent = data.length;
                    renderCategories();
                    renderList();
                });

            function renderCategories() {
                var container = document.getElementById('ps-categories');
                var html = '';
                for (var key in CATEGORIES) {
                    var count = key === 'All' ? stories.length : stories.filter(function(s) { return getCategory(s) === key; }).length;
                    if (count === 0) continue;
                    var active = key === activeCategory ? ' category-card-active' : '';
                    html += '<div class="category-card' + active + '" data-cat="' + key + '" style="background:' + CATEGORIES[key].color + '">' +
                        '<span class="category-icon">' + CATEGORIES[key].icon + '</span>' +
                        '<span class="category-name">' + key + '</span>' +
                        '<span class="category-count">' + count + '</span></div>';
                }
                container.innerHTML = html;
                container.querySelectorAll('.category-card').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var cat = btn.dataset.cat;
                        activeCategory = cat;
                        container.querySelectorAll('.category-card').forEach(function(b) { b.classList.remove('category-card-active'); });
                        btn.classList.add('category-card-active');
                        var searchVal = document.getElementById('ps-search-input').value;
                        renderList(searchVal);
                    });
                });
            }

            function renderList(filter) {
                var q = (filter || '').toLowerCase().trim();
                var filtered = stories.filter(function(s) {
                    var matchesCat = activeCategory === 'All' || getCategory(s) === activeCategory;
                    if (!matchesCat) return false;
                    if (!q) return true;
                    return s.title.toLowerCase().includes(q) ||
                           s.tags.some(function(t) { return t.toLowerCase().includes(q); }) ||
                           s.content.some(function(c) { return c.toLowerCase().includes(q); });
                });
                listEl.innerHTML = filtered.map(function(s) {
                    return '<div class="ps-card" data-id="' + s.id + '">' +
                        '<div class="ps-card-top">' +
                            '<div class="ps-card-icon">' + s.icon + '</div>' +
                            '<div class="ps-card-info">' +
                                '<div class="ps-card-title">' + s.title + '</div>' +
                                '<div class="ps-card-meta">' + s.readTime + ' · Ages ' + s.ageRange + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="ps-card-tags">' +
                            s.tags.map(function(t) { return '<span class="ps-card-tag">' + t + '</span>'; }).join('') +
                        '</div>' +
                    '</div>';
                }).join('');

                if (filtered.length === 0) {
                    listEl.innerHTML = '<div style="text-align:center;padding:40px 20px;color:rgba(255,255,255,0.3);font-size:0.9rem">🔍 No stories found. Try a different search!</div>';
                }

                listEl.querySelectorAll('.ps-card').forEach(function(card) {
                    card.addEventListener('click', function() {
                        var id = card.dataset.id;
                        var story = stories.find(function(s) { return s.id === id; });
                        if (story) openStory(story);
                    });
                });
            }

            // Search
            var searchInput = document.getElementById('ps-search-input');
            if (searchInput) {
                searchInput.addEventListener('input', function() {
                    renderList(this.value);
                });
            }

            // Carousel arrows
            document.getElementById('ps-prev').addEventListener('click', function() {
                document.getElementById('ps-list').scrollBy({ left: -280, behavior: 'smooth' });
            });
            document.getElementById('ps-next').addEventListener('click', function() {
                document.getElementById('ps-list').scrollBy({ left: 280, behavior: 'smooth' });
            });

            function openStory(story) {
                storyIcon.textContent = story.icon;
                storyTitle.textContent = story.title;
                storyMeta.textContent = story.readTime + ' · Ages ' + story.ageRange;
                storyBody.innerHTML = story.content.map(function(p) { return '<p>' + p + '</p>'; }).join('');
                listView.style.display = 'none';
                readerView.classList.add('open');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            backBtn.addEventListener('click', function() {
                stopSpeech();
                readerView.classList.remove('open');
                listView.style.display = '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // ===== READ ALOUD (SpeechSynthesis) =====
            var synth = window.speechSynthesis;
            var currentUtterance = null;
            var isPaused = false;
            var speechRate = 1.0;
            var currentParagraphs = [];
            var currentIdx = 0;

            var playBtn = document.getElementById('ps-play-btn');
            var pauseBtn = document.getElementById('ps-pause-btn');
            var stopBtn = document.getElementById('ps-stop-btn');
            var speedBtn = document.getElementById('ps-speed-btn');
            var audioStatus = document.getElementById('ps-audio-status');

            function speakParagraph(index) {
                if (!synth || index >= currentParagraphs.length) {
                    stopSpeech();
                    return;
                }

                // Highlight the current paragraph
                currentParagraphs.forEach(function(p, i) {
                    p.classList.toggle('speaking', i === index);
                });

                var text = currentParagraphs[index].textContent;
                currentIdx = index;

                currentUtterance = new SpeechSynthesisUtterance(text);
                currentUtterance.rate = speechRate;
                currentUtterance.pitch = 0.9;
                currentUtterance.lang = 'en-US';

                // Pick a nice voice if available
                var voices = synth.getVoices();
                var kidVoice = voices.find(function(v) { return /google.*uk|female|children/i.test(v.name); }) ||
                               voices.find(function(v) { return /english/i.test(v.name); });
                if (kidVoice) currentUtterance.voice = kidVoice;

                currentUtterance.onend = function() {
                    if (index + 1 < currentParagraphs.length) {
                        speakParagraph(index + 1);
                    } else {
                        stopSpeech();
                        audioStatus.textContent = '🔊 Finished!';
                        setTimeout(function() { audioStatus.textContent = ''; }, 2000);
                    }
                };

                currentUtterance.onerror = function() {
                    stopSpeech();
                };

                synth.speak(currentUtterance);
                audioStatus.textContent = '🔊 Reading... (' + (index + 1) + '/' + currentParagraphs.length + ')';
            }

            function startSpeech() {
                if (!synth) { alert('Read Aloud is not supported in this browser.'); return; }
                stopSpeech();
                isPaused = false;
                currentParagraphs = storyBody.querySelectorAll('p');
                if (currentParagraphs.length === 0) return;
                currentIdx = 0;
                playBtn.style.display = 'none';
                pauseBtn.style.display = '';
                pauseBtn.textContent = '⏸ Pause';
                stopBtn.style.display = '';
                playBtn.classList.remove('speaking-active');
                speakParagraph(0);
            }

            function togglePause() {
                if (!synth) return;
                if (isPaused) {
                    synth.resume();
                    isPaused = false;
                    pauseBtn.textContent = '⏸ Pause';
                    audioStatus.textContent = '🔊 Reading... (' + (currentIdx + 1) + '/' + currentParagraphs.length + ')';
                } else {
                    synth.pause();
                    isPaused = true;
                    pauseBtn.textContent = '▶ Resume';
                    audioStatus.textContent = '⏸ Paused';
                }
            }

            function stopSpeech() {
                if (synth) {
                    synth.cancel();
                    isPaused = false;
                }
                currentParagraphs.forEach(function(p) { p.classList.remove('speaking'); });
                playBtn.style.display = '';
                pauseBtn.style.display = 'none';
                stopBtn.style.display = 'none';
                playBtn.classList.remove('speaking-active');
                audioStatus.textContent = '';
            }

            playBtn.addEventListener('click', startSpeech);
            pauseBtn.addEventListener('click', togglePause);
            stopBtn.addEventListener('click', stopSpeech);

            // Speed toggle
            speedBtn.addEventListener('click', function() {
                var speeds = [0.75, 1.0, 1.25, 1.5];
                var idx = speeds.indexOf(speechRate);
                speechRate = speeds[(idx + 1) % speeds.length];
                speedBtn.textContent = speechRate.toFixed(2).replace(/\.?0+$/, '') + '×';
                // If currently speaking, update rate for next paragraph
            });

            // Load voices (they load async)
            if (synth) {
                synth.getVoices(); // Trigger initial load
                synth.onvoiceschanged = function() { synth.getVoices(); };
            }
        })();
    </script>
    <script src="/assets/js/firebase-loader.js"></script>
    <script src="/assets/js/footer.js"></script>
</body>
