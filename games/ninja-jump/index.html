<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🥷 Ninja Jump — Hriti's Game Hub</title>
    <meta name="description" content="Jump, dash, and flip through treacherous platforms as a ninja!">
    <meta name="theme-color" content="#2c3e50">
    <meta property="og:title" content="🥷 Ninja Jump">
    <meta property="og:description" content="A vertical platformer where a ninja jumps higher and higher!">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥷</text></svg>">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="ninja-jump-page">

    <div class="ad-banner ad-banner-top hidden-ad" aria-hidden="true"></div>

    <header id="nj-hud">
        <div class="nj-hud-left">
            <a href="/" class="hud-btn back-btn" title="Back to Game Hub">🏠</a>
            <span class="nj-title">🥷 Ninja Jump</span>
        </div>
        <div class="nj-hud-center">
            <span class="nj-level-display">Height: <span id="nj-height">0</span>m</span>
        </div>
        <div class="nj-hud-right">
            <span class="nj-score-display">⭐ <span id="nj-score">0</span></span>
            <button class="hud-btn mute-btn" id="nj-mute-btn" title="Toggle sound">🔊</button>
            <button class="hud-btn nj-reset-btn" id="nj-reset-btn" title="Reset progress">🔄</button>
        </div>
    </header>

    <section id="nj-game-area">
        <div class="nj-canvas-wrapper" id="nj-canvas-wrapper">
            <canvas id="nj-canvas" width="500" height="550"></canvas>

            <div class="nj-overlay" id="nj-start-overlay">
                <div class="nj-overlay-content">
                    <div class="nj-overlay-icon">🥷</div>
                    <div class="nj-overlay-title">Ninja Jump!</div>
                    <div class="nj-overlay-sub">Click left/right to jump! Climb as high as you can!</div>
                    <button class="nj-btn" id="nj-start-btn">Play ▶</button>
                </div>
            </div>

            <div class="nj-overlay hidden" id="nj-gameover-overlay">
                <div class="nj-overlay-content">
                    <div class="nj-overlay-icon">💥</div>
                    <div class="nj-overlay-title">Game Over!</div>
                    <div class="nj-overlay-sub" id="nj-gameover-stats">Height: 0m | Score: 0 | Best: 0</div>
                    <button class="nj-btn" id="nj-restart-btn">Play Again 🔄</button>
                </div>
            </div>
        </div>

        <div id="nj-bottom-hud">
            <span class="nj-stat"><span class="nj-stat-label">Height</span> <span id="nj-height-bottom">0</span>m</span>
            <span class="nj-stat"><span class="nj-stat-label">Score</span> <span id="nj-score-bottom">0</span></span>
            <span class="nj-stat"><span class="nj-stat-label">Best</span> <span id="nj-best">0</span></span>
            <span class="nj-stat"><span class="nj-stat-label">Collect</span> ⭐<span id="nj-stars">0</span></span>
        </div>
    </section>

    <div class="ad-banner ad-banner-bottom hidden-ad" aria-hidden="true"></div>

    <script src="/games/ninja-jump/js/game.js"></script>
</body>
</html>
