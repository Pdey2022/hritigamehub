<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <meta name="description" content="Navigate mazes, solve puzzles, and find the hidden treasure!">
    <meta name="theme-color" content="#1a5276">
    <meta property="og:title" content="🗺️ Puzzle Path — Free Online Game">
    <meta property="og:description" content="Navigate mazes, collect stars, dodge obstacles, and find treasure in this free puzzle adventure game!">
    <meta property="og:url" content="https://hritihub.uk/games/puzzle-path/">
    <meta property="og:image" content="https://hritihub.uk/assets/images/hub-og.svg">
    <meta property="og:site_name" content="Hriti's Game Hub">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="🗺️ Puzzle Path — Free Online Game">
    <meta name="twitter:description" content="Free maze puzzle game. Navigate, collect, win! Play now.">
    <meta name="twitter:image" content="https://hritihub.uk/assets/images/hub-og.svg">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
    <link rel="canonical" href="https://hritihub.uk/games/puzzle-path/">
    <link rel="stylesheet" href="/assets/css/style.css?v=3">
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"VideoGame","name":"Puzzle Path","description":"Navigate mazes, collect stars, dodge obstacles, and find the treasure in this puzzle adventure game!","url":"https://hritihub.uk/games/puzzle-path/","applicationCategory":"Game","operatingSystem":"Web Browser","browserRequirements":"Requires JavaScript"}</script>
    <link rel="stylesheet" href="/games/puzzle-path/css/puzzle-path.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="puzzle-path-page">

    <!-- ===== HUD ===== -->
    <header id="pp-hud">
        <div class="pp-hud-left">
            <a href="/" class="hud-btn back-btn" title="Back to Game Hub">🏠</a>
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="/">Home</a>
                <span class="bc-sep">›</span>
                <span>Puzzle Path</span>
            </nav>
            <span class="pp-title">🗺️ Puzzle Path</span>
        </div>
        <div class="pp-hud-center">
            <span class="pp-level-display">Level <span id="pp-level">1</span></span>
        </div>
        <div class="pp-hud-right">
            <span class="pp-score-display">⭐ <span id="pp-score">0</span></span>
            <button class="hud-btn mute-btn" id="pp-mute-btn" title="Toggle sound">🔊</button>
            <button class="hud-btn pp-reset-btn" id="pp-reset-btn" title="Reset progress">🔄</button>
        </div>
    </header>

    <!-- ===== GAME AREA ===== -->
    <section id="pp-game-area">
        <div class="pp-canvas-wrapper" id="pp-canvas-wrapper">
            <canvas id="pp-canvas" width="500" height="550"></canvas>

            <!-- Start Overlay -->
            <div class="pp-overlay" id="pp-start-overlay">
                <div class="pp-overlay-content">
                    <div class="pp-overlay-icon">🗺️</div>
                    <div class="pp-overlay-title">Puzzle Path!</div>
                    <div class="pp-overlay-sub">Use ← → ↑ ↓ arrows to navigate the maze and find the treasure!</div>
                    <button class="pp-btn" id="pp-start-btn">Play ▶</button>
                </div>
            </div>

            <!-- Game Over Overlay -->
            <div class="pp-overlay hidden" id="pp-gameover-overlay">
                <div class="pp-overlay-content">
                    <div class="pp-overlay-icon">💥</div>
                    <div class="pp-overlay-title">Game Over!</div>
                    <div class="pp-overlay-sub" id="pp-gameover-stats">Score: 0 | Best: 0</div>
                    <button class="pp-btn" id="pp-restart-btn">Play Again 🔄</button>
                </div>
            </div>

            <!-- Level Complete Overlay -->
            <div class="pp-overlay hidden" id="pp-levelcomplete-overlay">
                <div class="pp-overlay-content">
                    <div class="pp-overlay-icon">🏆</div>
                    <div class="pp-overlay-title">Maze Solved!</div>
                    <div class="pp-overlay-sub" id="pp-levelcomplete-stats">Score: 0</div>
                    <button class="pp-btn" id="pp-nextlevel-btn">Next Maze ▶</button>
                </div>
            </div>

            <!-- Won Overlay -->
            <div class="pp-overlay hidden" id="pp-won-overlay">
                <div class="pp-overlay-content">
                    <div class="pp-overlay-icon">👑</div>
                    <div class="pp-overlay-title">You Won!</div>
                    <div class="pp-overlay-sub" id="pp-won-stats">Final Score: 0</div>
                    <button class="pp-btn" id="pp-playagain-btn">Play Again 🔄</button>
                </div>
            </div>
        </div>

        <!-- Bottom Stats -->
        <div id="pp-bottom-hud">
            <span class="pp-stat"><span class="pp-stat-label">Lives</span> <span id="pp-lives">❤️❤️❤️</span></span>
            <span class="pp-stat"><span class="pp-stat-label">Score</span> <span id="pp-score-bottom">0</span></span>
            <span class="pp-stat"><span class="pp-stat-label">Moves</span> <span id="pp-moves">0</span></span>
            <span class="pp-stat"><span class="pp-stat-label">Best</span> <span id="pp-best">0</span></span>
        </div>
    </section>

    <div class="ad-banner ad-banner-bottom hidden-ad" aria-hidden="true"></div>

    <script src="/games/puzzle-path/js/game.js?v=3"></script>
    <script>document.body.classList.add('loaded')</script>
</body>
</html>
