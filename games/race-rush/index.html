<body class="race-rush-page">

    <!-- ===== ADSENSE BANNER (hidden) ===== -->
    <div class="ad-banner ad-banner-top hidden-ad" aria-hidden="true"></div>

    <!-- ===== HUD ===== -->
    <header id="rr-hud">
        <div class="rr-hud-left">
            <a href="/" class="hud-btn back-btn" title="Back to Game Hub">🏠</a>
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="/">Home</a>
                <span class="bc-sep">›</span>
                <span>Race Rush</span>
            </nav>
            <span class="rr-title">🏎️ Race Rush</span>
        </div>
        <div class="rr-hud-center">
            <span class="rr-speed-display">Speed: <span id="rr-speed">0</span> km/h</span>
        </div>
        <div class="rr-hud-right">
            <span class="rr-score-display">🏆 <span id="rr-score">0</span></span>
            <button class="hud-btn mute-btn" id="rr-mute-btn" title="Toggle sound">🔊</button>
            <button class="hud-btn rr-reset-btn" id="rr-reset-btn" title="Reset progress">🔄</button>
        </div>
    </header>

    <!-- ===== GAME AREA ===== -->
    <section id="rr-game-area">
        <div class="rr-canvas-wrapper" id="rr-canvas-wrapper">
            <canvas id="rr-canvas" width="450" height="600"></canvas>

            <!-- Start Overlay -->
            <div class="rr-overlay" id="rr-start-overlay">
                <div class="rr-overlay-content">
                    <div class="rr-overlay-icon">🏎️</div>
                    <div class="rr-overlay-title">Race Rush!</div>
                    <div class="rr-overlay-sub">Dodge traffic, collect coins, go the distance!</div>
                    <div class="rr-controls-hint">
                        <span>⬅️ ➡️ Arrow keys to steer</span>
                        <span>⬆️ Speed boost</span>
                    </div>
                    <button class="rr-btn" id="rr-start-btn">Race ▶</button>
                </div>
            </div>

            <!-- Game Over Overlay -->
            <div class="rr-overlay hidden" id="rr-gameover-overlay">
                <div class="rr-overlay-content">
                    <div class="rr-overlay-icon">💥</div>
                    <div class="rr-overlay-title">Crash!</div>
                    <div class="rr-overlay-sub" id="rr-gameover-stats">Distance: 0m | Coins: 0</div>
                    <button class="rr-btn" id="rr-restart-btn">Race Again 🔄</button>
                </div>
            </div>
        </div>

        <!-- Bottom HUD -->
        <div id="rr-bottom-hud">
            <div class="rr-stat">
                <span class="rr-stat-label">Distance</span>
                <span class="rr-stat-value"><span id="rr-distance">0</span>m</span>
            </div>
            <div class="rr-stat">
                <span class="rr-stat-label">Coins</span>
                <span class="rr-stat-value">🪙 <span id="rr-coins">0</span></span>
            </div>
            <div class="rr-stat">
                <span class="rr-stat-label">Best</span>
                <span class="rr-stat-value">🏆 <span id="rr-best">0</span>m</span>
            </div>
            <div class="rr-powerup-display" id="rr-powerup"></div>
        </div>
    </section>

    <!-- ===== ADSENSE BANNER (hidden) ===== -->
    <div class="ad-banner ad-banner-bottom hidden-ad" aria-hidden="true"></div>

    <!-- ===== LEADERBOARD ===== -->
    <section class="lb-section" id="rr-leaderboard">
        <div class="lb-header">
            <span class="lb-title">🏆 Leaderboard</span>
            <button class="share-btn" id="rr-share-btn">📤 Share</button>
        </div>
        <div id="lb-rr-content">
            <div class="lb-empty">
                <div class="lb-empty-icon">🏆</div>
                <div class="lb-empty-text">Sign in and play to top the leaderboard!</div>
            </div>
        </div>
    </section>

    <script src="/games/race-rush/js/game.js?v=8"></script>
<script>document.body.classList.add('loaded')</script>
<script src="/assets/js/footer.js"></script>
