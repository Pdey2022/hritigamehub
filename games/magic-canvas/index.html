<body class="magic-canvas-page">

    <!-- ===== HUD ===== -->
    <header id="mc-hud">
        <div class="mc-hud-left">
            <a href="/" class="hud-btn back-btn" title="Back to Game Hub">🏠</a>
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="/">Home</a>
                <span class="bc-sep">›</span>
                <span>Magic Canvas</span>
            </nav>
        </div>
        <div class="mc-hud-right">
            <span class="mc-score-display">🎨 <span id="mc-score">0</span></span>
            <button class="hud-btn mute-btn" id="mc-mute-btn" title="Toggle sound">🔊</button>
        </div>
    </header>

    <!-- ===== GAME AREA ===== -->
    <section id="mc-game-area">
        <div class="mc-canvas-wrapper" id="mc-canvas-wrapper">
            <canvas id="mc-canvas" width="500" height="500"></canvas>

            <!-- Start Overlay -->
            <div class="mc-overlay" id="mc-start-overlay">
                <div class="mc-overlay-content">
                    <div class="mc-overlay-icon">🎨</div>
                    <div class="mc-overlay-title">Magic Canvas</div>
                    <div class="mc-overlay-sub">Pick a brush, choose your colors, and create magical art! ✨</div>
                    <button class="mc-btn" id="mc-start-btn">Start Drawing 🖌️</button>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="mc-toolbar" id="mc-toolbar">
            <!-- Brush Tools -->
            <div class="mc-tool-group">
                <button class="mc-tool-btn active" data-tool="pen" title="Pen">✏️</button>
                <button class="mc-tool-btn" data-tool="rainbow" title="Rainbow">🌈</button>
                <button class="mc-tool-btn" data-tool="sparkle" title="Sparkle">✨</button>
                <button class="mc-tool-btn" data-tool="glow" title="Glow">💡</button>
                <button class="mc-tool-btn" data-tool="stars" title="Stars">⭐</button>
                <button class="mc-tool-btn" data-tool="eraser" title="Eraser">🧹</button>
            </div>

            <div class="mc-separator"></div>

            <!-- Colors -->
            <div class="mc-colors" id="mc-colors"></div>

            <div class="mc-separator"></div>

            <!-- Brush Size -->
            <div class="mc-size-group">
                <button class="mc-size-btn active" data-size="3">S</button>
                <button class="mc-size-btn" data-size="6">M</button>
                <button class="mc-size-btn" data-size="12">L</button>
            </div>

            <div class="mc-separator"></div>

            <!-- Actions -->
            <button class="mc-undo-btn mc-action-btn" id="mc-undo-btn">↩ Undo</button>
            <button class="mc-clear-btn mc-action-btn" id="mc-clear-btn">🗑️ Clear</button>
            <button class="mc-save-btn mc-action-btn" id="mc-save-btn">💾 Save</button>
        </div>

        <div class="mc-stats">Masterpieces: <span id="mc-score-bottom">0</span></div>
    </section>

    <!-- ===== LEADERBOARD ===== -->
    <section class="lb-section" id="mc-leaderboard">
        <div class="lb-header">
            <span class="lb-title">🏆 Top Artists</span>
            <button class="share-btn" id="mc-share-btn">📤 Share</button>
        </div>
        <div id="lb-mc-content">
            <div class="lb-empty">
                <div class="lb-empty-icon">🏆</div>
                <div class="lb-empty-text">Sign in and create art to top the leaderboard!</div>
            </div>
        </div>
    </section>

    <script src="/games/magic-canvas/js/game.js?v=7"></script>
    <script>document.body.classList.add('loaded')</script>
</body>
</html>
